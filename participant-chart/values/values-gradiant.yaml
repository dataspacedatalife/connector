keycloak:
  configMap:
    keycloakProxy: "edge"
    keycloakHostnameStrict: "false"
    keycloakHostnameBackchannelDynamic: "true"
    keycloakHostname: "https://conector-xdatashare.gradiant.org"
    keycloakFrontendUrl: "https://conector-xdatashare.gradiant.org"
    keycloakHealthEnable: "true"
    keycloakLogLevel: "info"
    keycloakHostnameDebug: "true"
    realm:
      name: "gradiant"
      frameAncestors: "https://conector-xdatashare.gradiant.org"
      frontendAuth:
        rootUrl: "https://conector-xdatashare.gradiant.org"
        adminUrl: "https://conector-xdatashare.gradiant.org"
        baseUrl: "https://conector-xdatashare.gradiant.org"
        logOutRedirectUri: "https://conector-xdatashare.gradiant.org/*"
        redirectUris:
          - "https://conector-xdatashare.gradiant.org/*"
        webOrigins:
          - "https://conector-xdatashare.gradiant.org"
      frontendDev:
        rootUrl: "https://conector-xdatashare.gradiant.org"
        adminUrl: "https://conector-xdatashare.gradiant.org"
        baseUrl: "https://conector-xdatashare.gradiant.org"
        logOutRedirectUri: "https://conector-xdatashare.gradiant.org/##https://conector-xdatashare.gradiant.org/*"
        redirectUris:
          - "https://conector-xdatashare.gradiant.org/*"
          - "https://conector-xdatashare.gradiant.org"
        webOrigins:
          - "https://conector-xdatashare.gradiant.org/*"
          - "https://conector-xdatashare.gradiant.org"

  deployment:
    replicaCount: 1
    image:
      name: keycloak
      repository: quay.io/keycloak/keycloak
      tag: "26.0"
      pullPolicy: IfNotPresent
    volumes:
      name: realms-import-volume
      mountPath: /opt/keycloak/data/import

  service:
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 8080
        targetPort: 8080
      - name: https
        protocol: TCP
        port: 8443
        targetPort: 8443
  ingress:
    host: conector-xdatashare.gradiant.org
    tlsSecretName: gradiant-kc-tls-cert
    paths:
      - path: /
        pathType: Prefix
        backend:
          serviceName: gradiant-keycloak-service
          servicePort: 8080

  secret:
    name: gradiant-keycloak-admin-credentials
    type: Opaque
    keycloakAdminUser: "admin"
    keycloakAdminPassword: "admin"

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  db:
    name: gradiant
    user: gradiant
    password: gradiant
    pgdata: /var/lib/postgresql/data/pgdata
  service:
