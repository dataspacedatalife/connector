    iamStsOauthTokenUrl: "http://gradiant-identityhub:9292/api/sts/token"
    vaultHashicorpUrl: "http://gradiant-vault:8200"
    datasourceDefaultUrl: "jdbc:postgresql://gradiant-postgres:5432/gradiant"
    datasourceDefaultUser: "gradiant"
    datasourceDefaultPassword: "gradiant"
    edcParisPublicBaseurl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/participant-public/api/participant-public"
    edcControlEndpoint: "http://gradiant-controlplane:9191/api/control"
    edcUseCaseApiUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/use-case/api/use-case"

  deployment:
    replicaCount: 1
    image:
      repository: dataspacedatalife/controlplane
      tag: "latest"
      pullPolicy: Always
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "gradiant-postgres"
          port: 5432
        - name: "Vault"
          host: "gradiant-vault"
          port: 8200
        - name: "Identityhub"
          host: "gradiant-identityhub"
          port: "8182"

  service:
    type: ClusterIP
    ports:
      - name: management
        port: 8181
        targetPort: 8181
      - name: paris
        port: 8081
        targetPort: 8081
      - name: version
        port: 7171
        targetPort: 7171
      - name: control
        port: 9191
        targetPort: 9191
      - name: dsp
        port: 8282
        targetPort: 8282
      - name: catalog
        port: 17171
        targetPort: 17171
      - name: observability
        port: 8182
        targetPort: 8182

  ingress:
    host: conector-xdatashare.gradiant.org
    tlsSecretName: gradiant-tls-cert
    paths:
      - path: /controlplane/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8181
      - path: /controlplane/participant(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8081
      - path: /controlplane/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 7171
      - path: /controlplane/dsp(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8282
      - path: /controlplane/catalog(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 17171

