global:
  postgres:
    db:
      url: jdbc:postgresql://gradiant-postgresql:5432/gradiant
      name: gradiant
      user: gradiant
      password: gradiant
  vault:
    url: http://gradiant-vault:8200
    token: root

controlplane:

  configMap:
    hostname: "conector3.dataspace.gradiant.org"
    iamIssuerId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    managementAuthDacKeyUrl: "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/certs"
    managementAuthKey: "Z3JhZGlhbnQtcGFzc3dvcmQ="
    catalogAuthDacKeyUrl: "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/certs"
    catalogAuthKey: "Z3JhZGlhbnQtcGFzc3dvcmQ="
    participantAuthDacKeyUrl: "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/certs"
    participantAuthKey: "Z3JhZGlhbnQtcGFzc3dvcmQ="
    iamStsPrivateKeyAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    participantId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    iamStsOauthClientSecretAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    iamAuthorityId: "did:web:demostrador-datalife.srv.cesga.es:dataspace-issuer:did-publisher"
    dspCallbackAddress: "https://conector3.dataspace.gradiant.org/controlplane/dsp/api/dsp"
    iamStsOauthTokenUrl: "http://gradiant-identityhub:9292/api/sts/token"
    edcParisPublicBaseurl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/participant-public/api/participant-public"
    edcControlEndpoint: "http://gradiant-controlplane:9191/api/control"
    edcUseCaseApiUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/use-case/api/use-case"

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "gradiant-postgresql"
          port: 5432
        - name: "Vault"
          host: "gradiant-vault"
          port: 8200
        - name: "Identityhub"
          host: "gradiant-identityhub"
          port: "8182"

  ingress:
    host: conector3.dataspace.gradiant.org
    tlsSecretName: gradiant-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /controlplane/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8181
      - path: /controlplane/participant(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8081
      - path: /controlplane/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 7171
      - path: /controlplane/dsp(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 8282
      - path: /controlplane/catalog(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-controlplane
          servicePort: 17171

dataplane:

  configMap:
    hostname: "conector3.dataspace.gradiant.org"
    transferProxyTokenVerifierPublicKeyAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    transferProxyTokenSignerPrivateKeyAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    dpfSelectorUrl: "http://gradiant-controlplane:9191/api/control/v1/dataplanes"
    participantId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    iamStsOauthClientSecretAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    iamStsOauthTokenUrl: "https://conector3.dataspace.gradiant.org/identityhub/sts/api/sts/token"
    edcDataplaneApiPublicBaseurl: "https://conector3.dataspace.gradiant.org/dataplane/public/api/public"
    edcControlEndpoint: "http://gradiant-dataplane:9191/api/control"

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "gradiant-postgresql"
          port: 5432
        - name: "Vault"
          host: "gradiant-vault"
          port: 8200
        - name: "Controlplane"
          host: "gradiant-controlplane"
          port: 9191

  ingress:
    host: conector3.dataspace.gradiant.org
    tlsSecretName: gradiant-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /dataplane/public(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-dataplane
          servicePort: 8185

identityhub:
  configMap:
    hostname: "conector3.dataspace.gradiant.org"
    iamStsPrivateKeyAlias: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:conector3.dataspace.gradiant.org:identityhub:did#key-1"
    ihIamId: "did:web:conector3.dataspace.gradiant.org:identityhub:did"
    ihApiSuperuserKey: "c3VwZXItdXNlcg==.c3VwZXItZ3JhZGlhbnQta2V5"

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "gradiant-postgresql"
          port: 5432
        - name: "Vault"
          host: "gradiant-vault"
          port: 8200

  ingress:
    host: conector3.dataspace.gradiant.org
    tlsSecretName: gradiant-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /identityhub/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-identityhub
          servicePort: 7171
      - path: /identityhub/credentials(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-identityhub
          servicePort: 13131
      - path: /identityhub/identity(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-identityhub
          servicePort: 15151

  ingressDid:
    host: conector3.dataspace.gradiant.org
    tlsSecretName: gradiant-tls-cert
    paths:
      - path: /identityhub/did(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: gradiant-identityhub
          servicePort: 10100

oauth2-proxy:
  enable: true
  config:
    clientID: "gradiant-proxy"
    clientSecret: "OOi6OX0DXmgmfyHPYqxEuyles3FXYQrL"
    configFile: |
      http_address = "0.0.0.0:4180"
      pass_authorization_header = true
      custom_templates_dir = "/templates"
      
      whitelist_domains = [ 
        "conector3.dataspace.gradiant.org", 
        "conector3-kc.dataspace.gradiant.org"
      ]
      
      email_domains = [ "*" ]
      cookie_refresh = "5m"
      cookie_expire  = "8h"
      
      provider = "keycloak-oidc"
      oidc_issuer_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace"
      
      login_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/auth"
      redeem_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/token"
      oidc_jwks_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/certs"
      validate_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/userinfo"
      skip_oidc_discovery = true
      
      backend_logout_url = "https://conector3-kc.dataspace.gradiant.org/realms/dataspace/protocol/openid-connect/logout?id_token_hint={id_token}"
      redirect_url = "https://conector3.dataspace.gradiant.org/oauth2/callback"
      
      allowed_groups = [ "/gradiant-group" ]
      skip_provider_button = true
      
      upstreams = [
        "http://gradiant-participant-portal-service:80/",
        "http://gradiant-controlplane:8181/api/management/",
        "http://gradiant-controlplane:17171/api/catalog/",
        "http://gradiant-controlplane:8081/api/participant/"
      ]

  extraVolumes:
    - name: templates
      configMap:
        name: gradiant-oauth2-proxy-templates
  extraVolumeMounts:
    - name: templates
      mountPath: "/templates"
      readOnly: true

  service:
    portNumber: 4180

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/pass-authorization-header: "true"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
      nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      cert-manager.io/cluster-issuer: "letsencrypt"
    className: "nginx"
    path: /
    pathType: Prefix
    hosts:
      - "conector3.dataspace.gradiant.org"
    tls:
      - secretName: gradiant-tls-cert
        hosts:
          - "conector3.dataspace.gradiant.org"

participant-portal:
  configMap:
    nodeEnv: "production"
    viteIconUrl: "/icons/gradiant.svg"
    viteEnableAudit: "true"
    viteParisUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service"
    viteKeycloakUrl: "https://conector3-kc.dataspace.gradiant.org"
    viteKeycloakRealm: "dataspace"
    viteKeycloakAuthClientId: "edc-frontend"
    viteEdcConnectorName: "gradiant"
    viteEdcConnectorBaseUrl: "https://conector3.dataspace.gradiant.org/"
    viteEdcConnectorCatalogUrl: "/api/catalog"
    viteEdcConnectorManagementUrl: "/api/management"
    viteEdcConnectorParticipantUrl: "/api/participant"
    viteEdcConnectorIdentityUrl: "https://conector3.dataspace.gradiant.org/identityhub/identity/api/identity"
    viteEdcConnectorPublicUrl: "https://conector3.dataspace.gradiant.org/dataplane/public/api/public"
