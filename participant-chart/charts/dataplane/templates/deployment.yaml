apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dataplane
spec:
  replicas: {{ .Values.deployment.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dataplane
  template:
    metadata:
      name: {{ .Release.Name }}-dataplane
      labels:
        app: {{ .Release.Name }}-dataplane
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              {{- range .Values.deployment.initContainers.dependencies }}
              echo "Waiting for {{ .name }} ({{ .host }}:{{ .port }})..."
              until nc -z -v -w30 {{ .host }} {{ .port }}; do
                echo "{{ .name }} not ready, retrying in 5s..."
                sleep 5
              done
              {{- end }}
              echo "All dependencies are ready. Continuing startup..."
      containers:
        - name: {{ .Release.Name }}-dataplane
          image: "{{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}"
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          ports:
            {{- range .Values.service.ports }}
            - containerPort: {{ .port }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-dataplane-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /api/observability/check/health
              port: 8182
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/observability/check/health
              port: 8182
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
