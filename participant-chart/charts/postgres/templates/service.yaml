apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
    - name: {{ .Values.service.name | default "postgres" }}
      port: {{ .Values.service.port | default 5432 }}
      targetPort: {{ .Values.service.targetPort | default 5432 }}
