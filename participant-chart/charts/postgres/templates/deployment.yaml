apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository | default "postgres" }}:{{ .Values.image.tag | default "15" }}"
          ports:
            - containerPort: {{ .Values.service.port | default 5432 }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.db.name | default "postgres" }}
            - name: POSTGRES_USER
              value: {{ .Values.db.user | default "postgres" }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.password | default "postgres" }}
            - name: PGDATA
              value: {{ .Values.volume.pgdata | default "/var/lib/postgresql/data/pgdata" }}
          volumeMounts:
            - name: {{ .Release.Name }}-postgres-data
              mountPath: {{ .Values.volume.mountPath | default "/var/lib/postgresql/data" }}
      volumes:
        - name: {{ .Release.Name }}-postgres-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-pvc
