apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-identityhub-config
data:
  EDC_HOSTNAME: {{ .Values.configMap.hostname | quote }}
  WEB_HTTP_CREDENTIALS_PATH: "/api/credentials"
  WEB_HTTP_IDENTITY_PATH: "/api/identity"
  WEB_HTTP_DID_PATH: "/"
  WEB_HTTP_VERSION_PATH: "/api/version"
  WEB_HTTP_STS_PATH: "/api/sts"
  EDC_IAM_DID_WEB_USE_HTTPS: "true"
  EDC_IAM_STS_PRIVATEKEY_ALIAS: {{ .Values.configMap.iamStsPrivateKeyAlias | quote }}
  EDC_IAM_STS_PUBLICKEY_ID: {{ .Values.configMap.iamStsPublicKeyId | quote }}
  EDC_IH_IAM_ID: {{ .Values.configMap.ihIamId | quote }}
  EDC_IH_API_SUPERUSER_KEY: {{ .Values.configMap.ihApiSuperuserKey | quote }}
  EDC_VAULT_HASHICORP_URL: {{ .Values.global.vault.url | quote }}
  # EDC_VAULT_HASHICORP_TOKEN: {{ .Values.global.vault.token | quote }}
  EDC_DATASOURCE_DEFAULT_URL: {{ .Values.global.postgres.db.url | quote}}
  EDC_DATASOURCE_DEFAULT_USER: {{ .Values.global.postgres.db.user | quote}}
  EDC_DATASOURCE_DEFAULT_PASSWORD: {{ .Values.global.postgres.db.password | quote}}
  EDC_SQL_SCHEMA_AUTOCREATE: "true"
  EDC_WEB_REST_CORS_ENABLED: "true"
  EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,authorization,x-api-key"
  EDC_WEB_REST_CORS_ORIGIN: "*"
  EDC_WEB_REST_CORS_METHODS: "GET, POST, DELETE, PUT, OPTIONS"
  JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:1044"
  USE_WAIT_FOR_IT: "false"