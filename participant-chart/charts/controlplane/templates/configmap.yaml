apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-controlplane-config
data:
  EDC_HOSTNAME: {{ .Values.configMap.hostname | quote }}
  EDC_IAM_ISSUER_ID: {{ .Values.configMap.iamIssuerId | quote }}
  WEB_HTTP_MANAGEMENT_PATH: "/api/management"
  WEB_HTTP_MANAGEMENT_AUTH_TYPE: "tokenbased"
  WEB_HTTP_MANAGEMENT_AUTH_KEY: {{ .Values.configMap.managementAuthKey | quote }}
  WEB_HTTP_PROTOCOL_PATH: "/api/dsp"
  WEB_HTTP_CONTROL_PATH: "/api/control"
  WEB_HTTP_CATALOG_PATH: "/api/catalog"
  WEB_HTTP_CATALOG_AUTH_TYPE: "tokenbased"
  WEB_HTTP_CATALOG_AUTH_KEY: {{ .Values.configMap.catalogAuthKey | quote }}
  WEB_HTTP_PARTICIPANT_AUTH_TYPE: "tokenbased"
  WEB_HTTP_PARTICIPANT_AUTH_KEY: {{ .Values.configMap.participantAuthKey | quote }}
  WEB_HTTP_VERSION_PATH: "/api/version"
  EDC_TRUSTED_ISSUERS_FILE: "/app/deployment/assets/issuers/trusted_issuers.json"
  EDC_IAM_DID_WEB_USE_HTTPS: "true"
  EDC_IAM_STS_PRIVATEKEY_ALIAS: {{ .Values.configMap.iamStsPrivateKeyAlias | quote }}
  EDC_IAM_STS_PUBLICKEY_ID: {{ .Values.configMap.iamStsPublicKeyId | quote }}
  EDC_DSP_CALLBACK_ADDRESS: {{ .Values.configMap.dspCallbackAddress | quote }}
  EDC_PARTICIPANT_ID: {{ .Values.configMap.participantId | quote }}
  EDC_CATALOG_CACHE_EXECUTION_DELAY_SECONDS:  "5"
  EDC_CATALOG_CACHE_EXECUTION_PERIOD_SECONDS:  "10"
  EDC_MANAGEMENT_CONTEXT_ENABLED: "true"
  EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS: {{ .Values.configMap.iamStsOauthClientSecretAlias | quote}}
  EDC_IAM_STS_OAUTH_CLIENT_ID: {{ .Values.configMap.iamStsOauthClientId | quote }}
  EDC_IAM_STS_OAUTH_TOKEN_URL: {{ .Values.configMap.iamStsOauthTokenUrl | quote }}
  EDC_PARIS-PUBLIC_BASE_URL: {{ .Values.configMap.edcParisPublicBaseurl | quote }}
  EDC_IAM_AUTHORITY_ID: {{ .Values.configMap.iamAuthorityId | quote }}
  EDC_PARTICIPANT_HEARTBEAT_MANAGER_EXECUTION_DELAY_SECONDS: "10"
  EDC_PARTICIPANT_HEARTBEAT_MANAGER_EXECUTION_PERIOD_SECONDS: "10"
  EDC_PARTICIPANT_HEARTBEAT_MANAGER_EXECUTION_ON_START: "true"
  EDC_VAULT_HASHICORP_URL: {{ .Values.configMap.vaultHashicorpUrl | quote }}
  EDC_VAULT_HASHICORP_TOKEN: "root"
  EDC_DATASOURCE_DEFAULT_URL: {{ .Values.configMap.datasourceDefaultUrl | quote}}
  EDC_DATASOURCE_DEFAULT_USER: {{ .Values.configMap.datasourceDefaultUser | quote}}
  EDC_DATASOURCE_DEFAULT_PASSWORD: {{ .Values.configMap.datasourceDefaultPassword | quote}}
  EDC_SQL_SCHEMA_AUTOCREATE: "true"
  EDC_WEB_REST_CORS_ENABLED: "true"
  EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,authorization,x-api-key"
  EDC_WEB_REST_CORS_ORIGIN: "*"
  EDC_WEB_REST_CORS_METHODS: "GET, POST, DELETE, PUT, OPTIONS"
  JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:1044"
  USE_WAIT_FOR_IT: "false"
  EDC_CONTROL_ENDPOINT: {{ .Values.configMap.edcControlEndpoint | quote }}
  EDC_USE-CASE_API_BASE_URL: {{ .Values.configMap.edcUseCaseApiUrl | quote }}