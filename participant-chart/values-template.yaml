controlplane:

  configMap:
    hostname: "{{HOST}}"
    iamIssuerId: "did:web:{{HOST}}:identityhub:did"
    managementAuthKey: "{{AUTH_KEY_B64}}"
    catalogAuthKey: "{{AUTH_KEY_B64}}"
    participantAuthKey: "{{AUTH_KEY_B64}}"
    iamStsPrivateKeyAlias: "did:web:{{HOST}}:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:{{HOST}}:identityhub:did#key-1"
    participantId: "did:web:{{HOST}}:identityhub:did"
    iamStsOauthClientSecretAlias: "did:web:{{HOST}}:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:{{HOST}}:identityhub:did"
    iamAuthorityId: "did:web:demostrador-datalife.srv.cesga.es:dataspace-issuer:did-publisher"
    dspCallbackAddress: "https://{{HOST}}/controlplane/dsp/api/dsp"
    iamStsOauthTokenUrl: "http://{{PARTICIPANT}}-identityhub:9292/api/sts/token"
    vaultHashicorpUrl: "http://{{PARTICIPANT}}-vault:8200"
    datasourceDefaultUrl: "jdbc:postgresql://{{PARTICIPANT}}-postgres:5432/{{PARTICIPANT}}"
    datasourceDefaultUser: "{{PARTICIPANT}}"
    datasourceDefaultPassword: "{{PARTICIPANT}}"
    edcParisPublicBaseurl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/participant-public/api/participant-public"
    edcControlEndpoint: "http://{{PARTICIPANT}}-controlplane:9191/api/control"
    edcUseCaseApiUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/use-case/api/use-case"

  deployment:
    replicaCount: 1
    image:
      repository: xdatashare/controlplane
      tag: "latest"
      pullPolicy: Always
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "{{PARTICIPANT}}-postgres"
          port: 5432
        - name: "Vault"
          host: "{{PARTICIPANT}}-vault"
          port: 8200
        - name: "Identityhub"
          host: "{{PARTICIPANT}}-identityhub"
          port: "8182"

  service:
    type: ClusterIP
    ports:
      - name: management
        port: 8181
        targetPort: 8181
      - name: paris
        port: 8081
        targetPort: 8081
      - name: version
        port: 7171
        targetPort: 7171
      - name: control
        port: 9191
        targetPort: 9191
      - name: dsp
        port: 8282
        targetPort: 8282
      - name: catalog
        port: 17171
        targetPort: 17171
      - name: observability
        port: 8182
        targetPort: 8182

  ingress:
    host: {{HOST}}
    tlsSecretName: {{PARTICIPANT}}-tls-cert
    paths:
      - path: /controlplane/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-controlplane
          servicePort: 8181
      - path: /controlplane/participant(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-controlplane
          servicePort: 8081
      - path: /controlplane/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-controlplane
          servicePort: 7171
      - path: /controlplane/dsp(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-controlplane
          servicePort: 8282
      - path: /controlplane/catalog(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-controlplane
          servicePort: 17171

dataplane:

  configMap:
    hostname: "{{HOST}}"
    transferProxyTokenVerifierPublicKeyAlias: "did:web:{{HOST}}:identityhub:did#key-1"
    transferProxyTokenSignerPrivateKeyAlias: "did:web:{{HOST}}:identityhub:did#key-1"
    dpfSelectorUrl: "http://{{PARTICIPANT}}-controlplane:9191/api/control/v1/dataplanes"
    participantId: "did:web:{{HOST}}:identityhub:did"
    vaultHashicorpUrl: "http://{{PARTICIPANT}}-vault:8200"
    datasourceDefaultUrl: "jdbc:postgresql://{{PARTICIPANT}}-postgres:5432/{{PARTICIPANT}}"
    datasourceDefaultUser: "{{PARTICIPANT}}"
    datasourceDefaultPassword: "{{PARTICIPANT}}"
    iamStsOauthClientSecretAlias: "did:web:{{HOST}}:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:{{HOST}}:identityhub:did"
    iamStsOauthTokenUrl: "https://{{HOST}}/identityhub/sts/api/sts/token"
    edcDataplaneApiPublicBaseurl: "https://{{HOST}}/dataplane/public/api/public"
    edcControlEndpoint: "http://{{PARTICIPANT}}-dataplane:9191/api/control"

  deployment:
    replicaCount: 1
    image:
      repository: xdatashare/dataplane
      tag: "latest"
      pullPolicy: Always
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "{{PARTICIPANT}}-postgres"
          port: 5432
        - name: "Vault"
          host: "{{PARTICIPANT}}-vault"
          port: 8200
        - name: "Controlplane"
          host: "{{PARTICIPANT}}-controlplane"
          port: 9191

  service:
    type: ClusterIP
    ports:
      - name: control
        port: 9191
        targetPort: 9191
      - name: public
        port: 8185
        targetPort: 8185
      - name: observability
        port: 8182
        targetPort: 8182

  ingress:
    host: {{HOST}}
    tlsSecretName: {{PARTICIPANT}}-tls-cert
    paths:
      - path: /dataplane/public(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-dataplane
          servicePort: 8185

identityhub:
  configMap:
    hostname: "{{HOST}}"
    iamStsPrivateKeyAlias: "did:web:{{HOST}}:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:{{HOST}}:identityhub:did#key-1"
    ihIamId: "did:web:{{HOST}}:identityhub:did"
    ihApiSuperuserKey: "{{SUPER_USER_KEY_B64}}"
    vaultHashicorpUrl: "http://{{PARTICIPANT}}-vault:8200"
    datasourceDefaultUrl: "jdbc:postgresql://{{PARTICIPANT}}-postgres:5432/{{PARTICIPANT}}"
    datasourceDefaultUser: "{{PARTICIPANT}}"
    datasourceDefaultPassword: "{{PARTICIPANT}}"

  deployment:
    replicaCount: 1
    image:
      repository: xdatashare/identity-hub
      tag: "latest"
      pullPolicy: Always
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "{{PARTICIPANT}}-postgres"
          port: 5432
        - name: "Vault"
          host: "{{PARTICIPANT}}-vault"
          port: 8200

  service:
    type: ClusterIP
    ports:
      - name: version
        port: 7171
        targetPort: 7171
      - name: credentials
        port: 13131
        targetPort: 13131
      - name: identity
        port: 15151
        targetPort: 15151
      - name: did
        port: 10100
        targetPort: 10100
      - name: sts
        port: 9292
        targetPort: 9292
      - name: observability
        port: 8182
        targetPort: 8182

  ingress:
    host: {{HOST}}
    tlsSecretName: {{PARTICIPANT}}-tls-cert
    paths:
      - path: /identityhub/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-identityhub
          servicePort: 7171
      - path: /identityhub/credentials(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-identityhub
          servicePort: 13131
      - path: /identityhub/identity(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-identityhub
          servicePort: 15151

  ingressDid:
    host: {{HOST}}
    tlsSecretName: {{PARTICIPANT}}-tls-cert
    paths:
      - path: /identityhub/did(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: {{PARTICIPANT}}-identityhub
          servicePort: 10100

participant-portal:
  configMap:
    nodeEnv: "production"
    viteKeycloakUrl: "https://{{HOST_KC}}"
    viteKeycloakRealm: "{{PARTICIPANT}}"
    viteKeycloakClientId: "edc-frontend-dev"
    viteKeycloakClientSecret: "E7UT2fK0svwevIeyU6T9RUvdrqD7eMm9"
    viteEdcConnectorName: "{{PARTICIPANT}}"
    viteEdcConnectorBaseUrl: "https://{{HOST}}/"
    viteEdcConnectorCatalogUrl: "https://{{HOST}}/controlplane/catalog/api/catalog"
    viteEdcConnectorManagementUrl: "https://{{HOST}}/controlplane/management/api/management"
    viteEdcConnectorIdentityUrl: "https://{{HOST}}/identityhub/identity/api/identity"
    viteEdcConnectorPublicUrl: "https://{{HOST}}/dataplane/public/api/public"
    viteEdcConnectorAuthUrl: "https://{{HOST}}/"
    viteEdcConnectorApiKey: "{{AUTH_KEY_B64}}"
    viteEdcConnectorId: "did:web:{{HOST}}:identityhub:did"
    viteConnectorCheckInterval: "300000"
    viteConnectorTimeout: "15000"
    dev: "true"

  deployment:
    replicaCount: 1
    image:
      repository: xdatashare/participant-portal
      tag: "latest"
      pullPolicy: Always

  service:
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 80
        targetPort: 80

  ingress:
    host: {{HOST}}
    tlsSecretName: {{PARTICIPANT}}-tls-cert
    paths:
      - path: /
        pathType: Prefix
        backend:
          serviceName: {{PARTICIPANT}}-participant-portal-service
          servicePort: 80

keycloak:
  configMap:
    keycloakProxy: "edge"
    keycloakHostnameStrict: "false"
    keycloakHostnameBackchannelDynamic: "true"
    keycloakHostname: "https://{{HOST_KC}}"
    keycloakFrontendUrl: "https://{{HOST_KC}}"
    keycloakHealthEnable: "true"
    keycloakLogLevel: "info"
    keycloakHostnameDebug: "true"
    realm:
      name: "{{PARTICIPANT}}"
      frameAncestors: "https://{{HOST}}"
      frontendAuth:
        rootUrl: "https://{{HOST}}"
        adminUrl: "https://{{HOST}}"
        baseUrl: "https://{{HOST}}"
        logOutRedirectUri: "https://{{HOST}}/*"
        redirectUris:
          - "https://{{HOST}}/*"
        webOrigins:
          - "https://{{HOST}}"
      frontendDev:
        rootUrl: "https://{{HOST}}"
        adminUrl: "https://{{HOST}}"
        baseUrl: "https://{{HOST}}"
        logOutRedirectUri: "https://{{HOST}}/##https://{{HOST}}/*"
        redirectUris:
          - "https://{{HOST}}/*"
          - "https://{{HOST}}"
        webOrigins:
          - "https://{{HOST}}/*"
          - "https://{{HOST}}"

  deployment:
    replicaCount: 1
    image:
      name: keycloak
      repository: quay.io/keycloak/keycloak
      tag: "26.0"
      pullPolicy: IfNotPresent
    volumes:
      name: realms-import-volume
      mountPath: /opt/keycloak/data/import

  service:
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 8080
        targetPort: 8080
      - name: https
        protocol: TCP
        port: 8443
        targetPort: 8443
  ingress:
    host: {{HOST_KC}}
    tlsSecretName: {{PARTICIPANT}}-kc-tls-cert
    paths:
      - path: /
        pathType: Prefix
        backend:
          serviceName: {{PARTICIPANT}}-keycloak-service
          servicePort: 8080

  secret:
    name: {{PARTICIPANT}}-keycloak-admin-credentials
    type: Opaque
    keycloakAdminUser: "admin"
    keycloakAdminPassword: "admin"

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  db:
    name: {{PARTICIPANT}}
    user: {{PARTICIPANT}}
    password: {{PARTICIPANT}}
    pgdata: /var/lib/postgresql/data/pgdata
  service:
    name: postgres
    port: 5432
    targetPort: 5432
  volume:
    accessMode: ReadWriteOnce
    storageClass: standard
    mountPath: /var/lib/postgresql/data
    size: 1Gi

vault:
  replicasCount: 1
  rootToken: root
  listenAddress: 0.0.0.0:8200
  image:
    repository: hashicorp/vault
    tag: "1.15.4"
    pullPolicy: IfNotPresent
  service:
    port: 8200
    targetPort: 8200
    portName: http

seeding:
  enabled: true
  participant:
    name: {{PARTICIPANT}}
    did: "did:web:{{HOST}}:identityhub:did"
    didB64: "{{DID_B64}}"
    keyId: "did:web:{{HOST}}:identityhub:did#key-1"
    privateKeyAlias: "did:web:{{HOST}}:identityhub:did#key-1"

  credentialIssuer:
    did: "did:web:demostrador-datalife.srv.cesga.es:dataspace-issuer:did-publisher"
    pid: "credential-request-{{PARTICIPANT}}-1"

  controlplane:
    service:
      observability:
        name: {{PARTICIPANT}}-controlplane
        port: 8182
      management:
        name: {{PARTICIPANT}}-controlplane
        port: 8181

  identityhub:
    service:
      observability:
        name: {{PARTICIPANT}}-identityhub
        port: 8182
      identity:
        name: {{PARTICIPANT}}-identityhub
        port: 15151

  serviceEndpoints:
    credentials:
      id: {{PARTICIPANT}}-credentialservice-1
      host: "{{HOST}}/identityhub/credentials"
      name: {{PARTICIPANT}}-identityhub
      port: 13131
      didB64: "{{DID_B64}}"
    controlplane:
      id: {{PARTICIPANT}}-dsp
      host: "{{HOST}}/controlplane/dsp"
      name: {{PARTICIPANT}}-controlplane
      port: 8282

  policies:
    - file: files/policies/general-role.json
    - file: files/policies/pharmacy-role.json
    - file: files/policies/healthauthority-role.json
    - file: files/policies/investigationcentre-role.json
    - file: files/policies/techcentre-role.json
    - file: files/policies/membership.json

  apiKeys:
    management: "{{AUTH_KEY_B64}}"
    identityhub: "{{SUPER_USER_KEY_B64}}"