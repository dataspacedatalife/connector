apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-oauth2-proxy-templates
  namespace: {{ .Release.Namespace }}
  labels:
    app: oauth2-proxy
data:
  error.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>403 Forbidden</title>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
            h1 { color: #cc0000; margin-top: 0; }
            p { color: #666; margin-bottom: 25px; }
            .btn { display: block; width: 100%; padding: 12px 0; margin-top: 10px; border-radius: 4px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
            .btn-primary { background-color: #000000; color: white; }
            .btn-primary:hover { background-color: #333333; }
            .debug { margin-top: 20px; font-size: 11px; color: #aaa; text-align: left; background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto;}
        </style>
    </head>
    <body>
    <div class="card">
        <h1>403 Forbidden</h1>
        <p>This user does not have permission to access this portal.</p>

        <a href={{ .Values.seeding.postLogoutRedirectUrl | quote}} class="btn btn-primary">
        Sign in with another user
        </a>
    </div>
    </body>
    </html>