{{- if .Values.seeding.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-frontend-client-seeding
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seeder-keycloak-client
          image: badouralix/curl-jq:latest
          env:
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seeding.auth.secretName }}
                  key: {{ .Values.seeding.auth.secretPasswordKey }}

          command: ["/bin/sh", "-c"]
          args:
            - |
              # ====================================================
              # 0. CONFIGURATION
              # ====================================================
              KC_URL="{{ .Values.seeding.keycloakUrl }}"
              KC_HEALTH="{{ .Values.seeding.keycloakHealth }}"
              REALM="{{ .Values.seeding.targetRealm }}"
              ADMIN="admin"
              PASS="$KC_ADMIN_PASSWORD"
              RELEASE_NAME="{{ .Release.Name }}"

              # ====================================================
              # 1. WAIT FOR KEYCLOAK (Wait for Readiness)
              # ====================================================
              echo "Waiting for Keycloak to be ready at $KC_HEALTH..."
              until curl -s -f "$KC_HEALTH/health/ready" > /dev/null; do
                echo "Keycloak is unavailable - sleeping"
                sleep 5
              done
              echo "Keycloak is UP!"

              # ====================================================
              # 2. OBTAIN ADMIN TOKEN
              # ====================================================
              echo "Getting Admin Token..."
              TOKEN=$(curl -s -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "username=$ADMIN" \
                -d "password=$PASS" \
                -d "grant_type=password" \
                -d "client_id=admin-cli" | jq -r '.access_token')

              if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
                echo "Error getting token. Check credentials."
                exit 1
              fi

              # ====================================================
              # 3. CREATE CLIENT
              # ====================================================

              # Aux Function to create the client
              create_client() {
                local FILE=$1
                echo "Creating Client from $FILE..."
                local HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST "$KC_URL/admin/realms/$REALM/clients" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @$FILE)

                if [ "$HTTP_CODE" -eq 201 ]; then
                   echo " -> Created successfully."
                elif [ "$HTTP_CODE" -eq 409 ]; then
                   echo " -> Already exists (409). Skipping."
                else
                   echo " -> Failed. HTTP Code: $HTTP_CODE"
                   exit 1
                fi
              }

              # Create Frontend Client
              create_client "/payload/frontend-client.json"

          volumeMounts:
            - name: payload-volume
              mountPath: /payload
      volumes:
        - name: payload-volume
          configMap:
            name: keycloak-frontend-client-seeding-payload
{{- end }}