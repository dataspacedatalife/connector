namespace: cesga-ds-connector-2

tls:
  useLetsEncrypt: false
  # Si useLetsEncrypt es false, definir los certificados:
  keycloak:
    secretName: keycloak-tls-secret
    crt: tls/tls-kc.crt
    key: tls/tls-kc.key
  connector:
    secretName: cesga-ds-connector-2-tls-secret
    crt: tls/tls.crt
    key: tls/tls.key
  # Si useLetsEncrypt es true, definir el email:
  # email: <email-para-lets-encrypt>
connector:
  name: cesga-ds-connector-2
  logo: icons/datalife_logo.webp
  address: cesga-ds-connector-2.dataspace.cesga.es      # Ej: <institution>-ds-connector-1.domain.es
  password: 1234

keycloak:
  address: cesga-ds-connector-2-kc.dataspace.cesga.es        # Ej: <institution>-ds-connector-1-kc.domain.es
  adminPassword: admin
