apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-frontend-client-seeding-config
data:
  KC_ADMIN_USER: "admin"
  KC_ADMIN_PASSWORD: "admin"
  KC_URL: "https://conector3-kc.dataspace.gradiant.org"
  KC_REALM_ADMIN: "master"
  KC_CLIENT_ADMIN: "admin-cli"
  frontend-client.json: |
    {
      "clientId": "edc-frontend",
      "name": "EDC frontend",
      "description": "Auto-generated by k8s Job",
      "rootUrl": "",
      "adminUrl": "",
      "baseUrl": "",
      "surrogateAuthRequired": false,
      "enabled": true,
      "alwaysDisplayInConsole": false,
      "clientAuthenticatorType": "client-secret",
      "redirectUris": [],
      "webOrigins": ["+"],
      "notBefore": 0,
      "bearerOnly": false,
      "consentRequired": false,
      "standardFlowEnabled": true,
      "implicitFlowEnabled": false,
      "directAccessGrantsEnabled": true,
      "serviceAccountsEnabled": false,
      "publicClient": true,
      "frontchannelLogout": true,
      "protocol": "openid-connect",
      "attributes": {
        "realm_client": "false",
        "oidc.ciba.grant.enabled": "false",
        "client.secret.creation.time": "1757938875",
        "backchannel.logout.session.required": "true",
        "post.logout.redirect.uris": "+",
        "display.on.consent.screen": "false",
        "oauth2.device.authorization.grant.enabled": "false",
        "backchannel.logout.revoke.offline.tokens": "false"
      },
      "defaultClientScopes": ["web-origins", "acr", "roles", "profile", "basic", "email"],
      "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"],
      "access": { "view": true, "configure": true, "manage": true }
    }

---

apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-frontend-client-seeding
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seeder-keycloak-client
          image: badouralix/curl-jq:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: keycloak-frontend-client-seeding-config
          command: ["/bin/sh", "-c"]
          args:
            - |
              # ====================================================
              # 1. WAIT FOR KEYCLOAK (Wait for Readiness)
              # ====================================================
              echo "Waiting for Keycloak to be ready at $KC_URL..."
              until curl -s -f "$KC_URL/health/ready" > /dev/null; do
                echo "Keycloak is unavailable - sleeping"
                sleep 5
              done
              echo "Keycloak is UP!"

              # ====================================================
              # 2. OBTAIN ADMIN TOKEN
              # ====================================================
              echo "Getting Admin Token..."
              TOKEN=$(curl -s -X POST "$KC_URL/realms/$KC_REALM_ADMIN/protocol/openid-connect/token"                 -H "Content-Type: application/x-www-form-urlencoded"                 -d "username=$KC_ADMIN_USER"                 -d "password=$KC_ADMIN_PASSWORD"                 -d "grant_type=password"                 -d "client_id=$KC_CLIENT_ADMIN" | jq -r '.access_token')

              if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
                echo "Error getting token. Check credentials."
                exit 1
              fi
              # ====================================================
              # 3. PREPARE THE DEFAULT CLIENT
              # ====================================================
              echo "Injecting KC_URL ($KC_URL) into payload..."
              jq --arg url "$KC_URL/*" '.redirectUris = [$url]' /payload/frontend-client.json > /tmp/final-payload.json
              echo "Payload prepared. Redirect URI set to: $KC_URL/*"

              # ====================================================
              # 4. CREATE CLIENT
              # ====================================================

              # Aux Function to create the client
              create_client() {
                local FILE=$1
                echo "Creating Client from $FILE..."
                local HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST "$KC_URL/admin/realms/dataspace/clients"                   -H "Authorization: Bearer $TOKEN"                   -H "Content-Type: application/json"                   -d @/tmp/final-payload.json)

                if [ "$HTTP_CODE" -eq 201 ]; then
                   echo " -> Created successfully."
                elif [ "$HTTP_CODE" -eq 409 ]; then
                   echo " -> Already exists (409). Skipping."
                else
                   echo " -> Failed. HTTP Code: $HTTP_CODE"
                   exit 1
                fi
              }

              # Create Frontend Client
              create_client "/tmp/final-payload.json"

          volumeMounts:
            - name: payload-volume
              mountPath: /payload
      volumes:
        - name: payload-volume
          configMap:
            name: keycloak-frontend-client-seeding-config
