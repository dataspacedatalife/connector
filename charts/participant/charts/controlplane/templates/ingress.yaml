apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-controlplane-ingress
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range .Values.ingress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .backend.serviceName | default (printf "%s-controlplane" $.Release.Name) }}
                port:
                  number: {{ .backend.servicePort }}
          {{- end }}
  tls:
    - hosts:
      - {{ .Values.ingress.host | quote}}
      secretName: {{ .Values.ingress.tlsSecretName }}