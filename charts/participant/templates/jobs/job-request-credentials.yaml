{{- if .Values.seeding.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-request-credential"
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": hook-succeeded, before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-identityhub
          image: curlimages/curl:8.5.0
          command: ["/bin/sh","-c"]
          args:
            - |
              echo "Waiting for IdentityHub to be ready..."
              until curl -s --fail "http://{{ .Values.seeding.identityhub.service.observability.name }}:{{ .Values.seeding.identityhub.service.observability.port }}/api/observability/check/health"; do
                echo "IdentityHub not ready, retrying in 5s..."
                sleep 5
              done
              echo "IdentityHub is ready!"
      containers:
        - name: request-credential
          image: curlimages/curl:8.5.0
          command: ["/bin/sh","-c"]
          args:
            - |
              echo "Requesting membership credential for {{ .Values.seeding.participant.name }}"
              ENCODED_DID=$(echo -n {{ .Values.seeding.participant.did }} | base64 -w0 | tr -d '=')

              curl -s --fail --location \
                --request POST "http://{{ .Values.seeding.identityhub.service.identity.name }}:{{ .Values.seeding.identityhub.service.identity.port }}/api/identity/v1alpha/participants/{{ .Values.seeding.participant.didB64 }}/credentials/request" \
                --header "Content-Type: application/json" \
                --header "x-api-key: {{ .Values.seeding.apiKeys.identityhub }}" \
                --data @- <<EOF
              {
                "issuerDid": {{ .Values.seeding.credentialIssuer.did | quote }},
                "holderPid": {{ .Values.seeding.credentialIssuer.pid | quote }},
                "credentials": [
                  {
                    "format": "VC1_0_JWT",
                    "credentialType": "XDataShareMembershipCredential"
                  }
                ]
              }
              EOF
              echo "\nSuccessfully requested credential. Sleeping 5s..."
              sleep 5
{{- end }}
