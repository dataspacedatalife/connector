{{- if .Values.seeding.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-seed-policies"
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": hook-succeeded, before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-controlplane
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              echo "Waiting for controlplane to be ready..."
              until curl -s --fail "http://{{ .Values.seeding.controlplane.service.observability.name }}:{{ .Values.seeding.controlplane.service.observability.port }}/api/observability/check/health"; do
                echo "Controlplane not ready, retrying in 5s..."
                sleep 5
              done
              echo "Controlplane is ready!"
      containers:
        - name: seed-policies
          image: curlimages/curl:8.5.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Seeding policies..."
              for file in /policies/*.json; do
                echo "Seeding $file..."
                curl -s --fail --location \
                  --request POST "http://{{ .Values.seeding.controlplane.service.management.name }}:{{ .Values.seeding.controlplane.service.management.port }}/api/management/v3/policydefinitions" \
                  --header "Content-Type: application/json" \
                  --header "x-api-key: {{ .Values.seeding.apiKeys.management }}" \
                  --data @"$file" \
                && echo "Successfully seeded $file" || echo "Failed to seed $file"
              done
          volumeMounts:
            - name: policies
              mountPath: /policies
      volumes:
        - name: policies
          configMap:
            name: {{ .Release.Name }}-policies
{{- end }}