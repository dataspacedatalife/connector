{{- if .Values.seeding.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-seeding-payload
data:
  proxy-client.json: |
    {
      "clientId": "{{ .Values.seeding.client.clientId }}",
      "name": "{{ .Release.Name }} proxy client",
      "description": "Auto-generated by k8s Job",
      "rootUrl": "",
      "adminUrl": "{{ .Values.seeding.client.publicUrl }}/",
      "baseUrl": "",
      "surrogateAuthRequired": false,
      "enabled": true,
      "alwaysDisplayInConsole": false,
      "clientAuthenticatorType": "client-secret",
      "secret": "{{ .Values.seeding.client.secret }}",
      "redirectUris": [
        "{{ .Values.seeding.client.publicUrl }}/oauth2/callback"
      ],
      "webOrigins": [
        "{{ .Values.seeding.client.publicUrl }}"
      ],
      "notBefore": 0,
      "bearerOnly": false,
      "consentRequired": false,
      "standardFlowEnabled": true,
      "implicitFlowEnabled": false,
      "directAccessGrantsEnabled": false,
      "serviceAccountsEnabled": false,
      "publicClient": false,
      "frontchannelLogout": true,
      "protocol": "openid-connect",
      "attributes": {
        "realm_client": "false",
        "oidc.ciba.grant.enabled": "false",
        "client.secret.creation.time": "1769608689",
        "backchannel.logout.session.required": "true",
        "post.logout.redirect.uris": "{{ .Values.seeding.client.publicUrl }}/",
        "oauth2.device.authorization.grant.enabled": "false",
        "display.on.consent.screen": "false",
        "backchannel.logout.revoke.offline.tokens": "false"
      },
      "authenticationFlowBindingOverrides": {},
      "fullScopeAllowed": true,
      "nodeReRegistrationTimeout": -1,
      "protocolMappers": [
        {
          "name": "audience_mapper",
          "protocol": "openid-connect",
          "protocolMapper": "oidc-audience-mapper",
          "consentRequired": false,
          "config": {
            "id.token.claim": "true",
            "lightweight.claim": "false",
            "introspection.token.claim": "true",
            "access.token.claim": "true",
            "included.custom.audience": "{{ .Values.seeding.client.did }}",
            "userinfo.token.claim": "true"
          }
        }
      ],
      "defaultClientScopes": [
        "web-origins", "acr", "roles", "profile", "basic", "email"
      ],
      "optionalClientScopes": [
        "address", "phone", "offline_access", "groups", "microprofile-jwt"
      ]
    }
{{- end }}