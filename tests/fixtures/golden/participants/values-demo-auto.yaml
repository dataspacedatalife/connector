global:
  postgres:
    db:
      url: jdbc:postgresql://demo-postgresql:5432/demo
      name: demo
      user: demo
      password: demo
  vault:
    url: http://demo-vault:8200
    token: root

controlplane:

  configMap:
    hostname: "connector.example.com"
    iamIssuerId: "did:web:connector.example.com:identityhub:did"
    managementAuthDacKeyUrl: "https://kc.example.com/realms/dataspace/protocol/openid-connect/certs"
    managementAuthKey: "ZGVtby1wYXNzd29yZA=="
    catalogAuthDacKeyUrl: "https://kc.example.com/realms/dataspace/protocol/openid-connect/certs"
    catalogAuthKey: "ZGVtby1wYXNzd29yZA=="
    participantAuthDacKeyUrl: "https://kc.example.com/realms/dataspace/protocol/openid-connect/certs"
    participantAuthKey: "ZGVtby1wYXNzd29yZA=="
    iamStsPrivateKeyAlias: "did:web:connector.example.com:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:connector.example.com:identityhub:did#key-1"
    participantId: "did:web:connector.example.com:identityhub:did"
    iamStsOauthClientSecretAlias: "did:web:connector.example.com:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:connector.example.com:identityhub:did"
    iamAuthorityId: "did:web:demostrador-datalife.srv.cesga.es:dataspace-issuer:did-publisher"
    dspCallbackAddress: "https://connector.example.com/controlplane/dsp/api/dsp"
    iamStsOauthTokenUrl: "http://demo-identityhub:9292/api/sts/token"
    edcParisPublicBaseurl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/participant-public/api/participant-public"
    edcControlEndpoint: "http://demo-controlplane:9191/api/control"
    edcUseCaseApiUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service/use-case/api/use-case"

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "demo-postgresql"
          port: 5432
        - name: "Vault"
          host: "demo-vault"
          port: 8200
        - name: "Identityhub"
          host: "demo-identityhub"
          port: "8182"

  ingress:
    host: connector.example.com
    tlsSecretName: demo-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /controlplane/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-controlplane
          servicePort: 8181
      - path: /controlplane/participant(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-controlplane
          servicePort: 8081
      - path: /controlplane/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-controlplane
          servicePort: 7171
      - path: /controlplane/dsp(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-controlplane
          servicePort: 8282
      - path: /controlplane/catalog(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-controlplane
          servicePort: 17171

dataplane:

  configMap:
    hostname: "connector.example.com"
    transferProxyTokenVerifierPublicKeyAlias: "did:web:connector.example.com:identityhub:did#key-1"
    transferProxyTokenSignerPrivateKeyAlias: "did:web:connector.example.com:identityhub:did#key-1"
    dpfSelectorUrl: "http://demo-controlplane:9191/api/control/v1/dataplanes"
    participantId: "did:web:connector.example.com:identityhub:did"
    iamStsOauthClientSecretAlias: "did:web:connector.example.com:identityhub:did-sts-client-secret"
    iamStsOauthClientId: "did:web:connector.example.com:identityhub:did"
    iamStsOauthTokenUrl: "https://connector.example.com/identityhub/sts/api/sts/token"
    edcDataplaneApiPublicBaseurl: "https://connector.example.com/dataplane/public/api/public"
    edcControlEndpoint: "http://demo-dataplane:9191/api/control"

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "demo-postgresql"
          port: 5432
        - name: "Vault"
          host: "demo-vault"
          port: 8200
        - name: "Controlplane"
          host: "demo-controlplane"
          port: 9191

  ingress:
    host: connector.example.com
    tlsSecretName: demo-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /dataplane/public(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-dataplane
          servicePort: 8185

identityhub:
  configMap:
    hostname: "connector.example.com"
    iamStsPrivateKeyAlias: "did:web:connector.example.com:identityhub:did#key-1"
    iamStsPublicKeyId: "did:web:connector.example.com:identityhub:did#key-1"
    ihIamId: "did:web:connector.example.com:identityhub:did"
    ihApiSuperuserKey: "c3VwZXItdXNlcg==.c3VwZXItZGVtby1rZXk="

  deployment:
    initContainers:
      dependencies:
        - name: "Postgres"
          host: "demo-postgresql"
          port: 5432
        - name: "Vault"
          host: "demo-vault"
          port: 8200

  ingress:
    host: connector.example.com
    tlsSecretName: demo-tls-cert
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    paths:
      - path: /identityhub/version(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-identityhub
          servicePort: 7171
      - path: /identityhub/credentials(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-identityhub
          servicePort: 13131
      - path: /identityhub/identity(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-identityhub
          servicePort: 15151

  ingressDid:
    host: connector.example.com
    tlsSecretName: demo-tls-cert
    paths:
      - path: /identityhub/did(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          serviceName: demo-identityhub
          servicePort: 10100

oauth2-proxy:
  enable: true
  config:
    clientID: "demo-proxy"
    clientSecret: "${CLIENT_SECRET}"
    configFile: |
      http_address = "0.0.0.0:4180"
      pass_authorization_header = true
      custom_templates_dir = "/templates"
      
      whitelist_domains = [ 
        "connector.example.com", 
        "kc.example.com"
      ]
      
      email_domains = [ "*" ]
      cookie_refresh = "5m"
      cookie_expire  = "8h"
      
      provider = "keycloak-oidc"
      oidc_issuer_url = "https://kc.example.com/realms/dataspace"
      
      login_url = "https://kc.example.com/realms/dataspace/protocol/openid-connect/auth"
      redeem_url = "https://kc.example.com/realms/dataspace/protocol/openid-connect/token"
      oidc_jwks_url = "https://kc.example.com/realms/dataspace/protocol/openid-connect/certs"
      validate_url = "https://kc.example.com/realms/dataspace/protocol/openid-connect/userinfo"
      skip_oidc_discovery = true
      
      backend_logout_url = "https://kc.example.com/realms/dataspace/protocol/openid-connect/logout?id_token_hint={id_token}"
      redirect_url = "https://connector.example.com/oauth2/callback"
      
      allowed_groups = [ "/demo-group" ]
      skip_provider_button = true
      
      upstreams = [
        "http://demo-participant-portal-service:80/",
        "http://demo-controlplane:8181/api/management/",
        "http://demo-controlplane:17171/api/catalog/",
        "http://demo-controlplane:8081/api/participant/"
      ]

  extraVolumes:
    - name: templates
      configMap:
        name: demo-oauth2-proxy-templates
  extraVolumeMounts:
    - name: templates
      mountPath: "/templates"
      readOnly: true

  service:
    portNumber: 4180

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/pass-authorization-header: "true"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
      nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      cert-manager.io/cluster-issuer: "letsencrypt"
    className: "nginx"
    path: /
    pathType: Prefix
    hosts:
      - "connector.example.com"
    tls:
      - secretName: demo-tls-cert
        hosts:
          - "connector.example.com"

participant-portal:
  configMap:
    nodeEnv: "production"
    viteIconUrl: "/icons/datalife_logo.webp"
    viteEnableAudit: "true"
    viteParisUrl: "https://demostrador-datalife.srv.cesga.es/participant-information-service"
    viteKeycloakUrl: "https://kc.example.com"
    viteKeycloakRealm: "dataspace"
    viteKeycloakAuthClientId: "edc-frontend"
    viteEdcConnectorName: "demo"
    viteEdcConnectorBaseUrl: "https://connector.example.com/"
    viteEdcConnectorCatalogUrl: "/api/catalog"
    viteEdcConnectorManagementUrl: "/api/management"
    viteEdcConnectorParticipantUrl: "/api/participant"
    viteEdcConnectorIdentityUrl: "https://connector.example.com/identityhub/identity/api/identity"
    viteEdcConnectorPublicUrl: "https://connector.example.com/dataplane/public/api/public"
    viteEdcConnectorAuthUrl: "https://connector.example.com/"
    viteEdcConnectorId: "did:web:connector.example.com:identityhub:did"
    viteConnectorCheckInterval: "300000"
    viteConnectorTimeout: "15000"
    dev: "true"

seeding:
  enabled: true
  participant:
    url: "https://connector.example.com"
    name: demo
    did: "did:web:connector.example.com:identityhub:did"
    didB64: "ZGlkOndlYjpjb25uZWN0b3IuZXhhbXBsZS5jb206aWRlbnRpdHlodWI6ZGlk"
    keyId: "did:web:connector.example.com:identityhub:did#key-1"
    privateKeyAlias: "did:web:connector.example.com:identityhub:did#key-1"

  credentialIssuer:
    did: "did:web:demostrador-datalife.srv.cesga.es:dataspace-issuer:did-publisher"
    pid: "credential-request-demo-1"

  controlplane:
    service:
      observability:
        name: demo-controlplane
        port: 8182
      management:
        name: demo-controlplane
        port: 8181

  identityhub:
    service:
      observability:
        name: demo-identityhub
        port: 8182
      identity:
        name: demo-identityhub
        port: 15151

  serviceEndpoints:
    credentials:
      id: demo-credentialservice-1
      host: "connector.example.com/identityhub/credentials"
      name: demo-identityhub
      port: 13131
      didB64: "ZGlkOndlYjpjb25uZWN0b3IuZXhhbXBsZS5jb206aWRlbnRpdHlodWI6ZGlk"
    controlplane:
      id: demo-dsp
      host: "connector.example.com/controlplane/dsp"
      name: demo-controlplane
      port: 8282

  policies:
    - file: files/policies/shared-with-all.json
    - file: files/policies/shared-with-dsga.json

  apiKeys:
    management: "ZGVtby1wYXNzd29yZA=="
    identityhub: "c3VwZXItdXNlcg==.c3VwZXItZGVtby1rZXk="

  keycloakUrl: "https://kc.example.com"
  targetRealm: "dataspace"
  postLogoutRedirectUrl: "/oauth2/sign_out?rd=https%3A%2F%2Fkc.example.com%2Frealms%2Fdataspace%2Fprotocol%2Fopenid-connect%2Flogout%3Fpost_logout_redirect_uri%3Dhttps%3A%2F%2Fconnector.example.com%2F%26client_id%3Ddemo-proxy"
  auth:
    adminUsername: "admin"
    adminPassword: "admin"

  client:
    clientId: "demo-proxy"
    publicUrl: "https://connector.example.com"
    secret: "${CLIENT_SECRET}"
    did: "did:web:connector.example.com:identityhub:did"
  defaultUser:
    create: true
    password: "super-secret"
